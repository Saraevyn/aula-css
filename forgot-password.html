<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Meu App</title>
    <link rel="stylesheet" href="styles/login.css">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🔑 Recuperar Senha</h1>
            <p>Envie um link para redefinir sua senha</p>
        </div>

        <div id="alert" class="alert"></div>

        <form id="forgotForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
            </div>

            <button type="submit" class="login-btn">Enviar Link de Recuperação</button>
        </form>

        <div style="text-align: center; margin-top: 25px;">
            <a href="index.html" class="forgot-password">
                ← Voltar para o login
            </a>
        </div>
    </div>

    <script src="data/users.js"></script>
    <script src="scripts/forgot.js"></script>
</body>
</html>
