<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu App</title>
    <link rel="stylesheet" href="styles/styles/dashboard.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <i class="ph ph-rocket-launch"></i>
                <span>Meu App</span>
            </div>
            <nav>
                <a href="#" class="active"><i class="ph ph-house"></i> Home</a>
                <a href="#"><i class="ph ph-chart-line"></i> Estatísticas</a>
                <a href="#"><i class="ph ph-user"></i> Perfil</a>
                <a href="#"><i class="ph ph-gear"></i> Configurações</a>
            </nav>
            <button id="logoutBtn"><i class="ph ph-sign-out"></i> Sair</button>
        </aside>

        <main class="main-content">
            <header>
                <h1>Bem-vindo de volta!</h1>
                <p id="userDisplay"></p>
            </header>

            <section class="stats-grid">
                <div class="card">
                    <i class="ph ph-projector-screen-chart"></i>
                    <h3>Projetos Ativos</h3>
                    <p>12</p>
                </div>
                <div class="card">
                    <i class="ph ph-check-circle"></i>
                    <h3>Tarefas Concluídas</h3>
                    <p>85</p>
                </div>
                <div class="card">
                    <i class="ph ph-clock"></i>
                    <h3>Horas Focadas</h3>
                    <p>24h</p>
                </div>
            </section>
        </main>
    </div>
    <script src="scripts/scripts/dashboard.js"></script>
</body>

</html>
