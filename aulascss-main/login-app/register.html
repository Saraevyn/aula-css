<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Meu App</title>
    <link rel="stylesheet" href="styles/login.css">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>✨ Criar Conta</h1>
            <p>Crie sua conta gratuitamente</p>
        </div>

        <div id="alert" class="alert"></div>

        <form id="registerForm">
            <div class="form-group">
                <label for="name">Nome</label>
                <input type="text" id="name" name="name" placeholder="Seu nome completo" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required minlength="6">
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar Senha</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required minlength="6">
            </div>

            <button type="submit" class="login-btn">Criar Conta</button>
        </form>

        <div style="text-align: center; margin-top: 25px;">
            <a href="index.html" class="forgot-password">
                ← Já tem conta? Fazer login
            </a>
        </div>
    </div>

    <script src="data/users.js"></script>
    <script src="scripts/register.js"></script>
</body>
</html>
